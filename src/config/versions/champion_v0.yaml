# Initial champion config (v0 baseline the improvement loop starts from — plan U1/v0 baseline).
# Prompt/playbook bodies are placeholders here; real content is authored in the brain/KB units
# (U3–U5). What matters at U1 is that a versioned, typed config loads and stamps episodes.
version: champion_v0
kb_version: kb_v0

persona:
  name: Alex
  role: learning advisor
  style: warm-consultative   # empathetic, educational, low-pressure (R3)

prompts:
  dst: "PLACEHOLDER — DST extraction prompt (authored in U3)"
  policy: "PLACEHOLDER — gated policy prompt (authored in U4)"
  nlg: "PLACEHOLDER — NLG realization prompt (authored in U4)"

playbooks:
  # SPIN-grounded discovery sequence (R35); budget intentionally late (trust-gated).
  discovery_sequence: [grade_level, subject, goal, timeline, prior_tutoring, budget]
  # objection -> rebuttal pointers (KB-grounded content lands in U5)
  rebuttals:
    price: PLACEHOLDER
    efficacy_doubt: PLACEHOLDER
    diy_free: PLACEHOLDER
    timing: PLACEHOLDER
    decision_maker: PLACEHOLDER

thresholds:
  # Cold-start priors (logged as guesses pending sim calibration — see belief-state-schema.md).
  trust_gate_open_price: 0.5
  pushiness_cap: 0.7
  escalate_low_confidence_turns: 2
